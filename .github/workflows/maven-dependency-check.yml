# Full OWASP Dependency-Check + NVD sync. Intended for scheduled or manual runs only.
# PR/push builds use maven-build.yml with -Ddependency-check.skip=true so every commit
# stays fast and does not depend on NVD API availability or multi‑hundred‑MB downloads.

name: Dependency check (OWASP / NVD)

on:
  workflow_call:
    secrets:
      NVD_API_KEY:
        required: false

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Week id for NVD cache key
      id: week
      run: echo "week=$(date -u '+%Y-%W')" >> $GITHUB_OUTPUT

    - name: Cache OWASP NVD data directory
      uses: actions/cache@v4
      with:
        path: /home/runner/.m2/dependency-check-data
        key: nvd-${{ runner.os }}-${{ steps.week.outputs.week }}
        restore-keys: nvd-${{ runner.os }}-

    - name: Run verify with dependency-check
      run: ./mvnw -B verify -Dgpg.skip=true --file pom.xml
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
