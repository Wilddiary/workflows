# Fast CI: no OWASP/NVD on every run (see maven-dependency-check.yml for full scan).
# Keep -Ddependency-check.skip=true: without it, verify would hit the NVD API and needs NVD_API_KEY + cache.

name: Build

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: ./mvnw -B verify -Dgpg.skip=true -Ddependency-check.skip=true --file pom.xml

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
