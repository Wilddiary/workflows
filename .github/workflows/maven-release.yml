# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Release

on:
  push:
    branches: [ "main" ]
  workflow_call:
    secrets:
      GPG_PRIVATE_KEY:
        required: true
      GPG_PASS_PHRASE:
        required: true
      DEPLOY_PRIVATE_KEY:
        required: true
      CENTRAL_USERNAME:
        required: true
      CENTRAL_TOKEN:
        required: true
      NVD_API_KEY:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ssh-key: ${{ secrets.DEPLOY_PRIVATE_KEY }}

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        server-id: central
        server-username: CENTRAL_USERNAME
        server-password: CENTRAL_TOKEN
        cache: maven

    - name: Import GPG key
      run: |
        echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        gpg --list-secret-keys --keyid-format LONG

    - name: Build with Maven
      run: |
       git config --global user.email "git@github.com"
       git config --global user.name "GitHub CI"
       git checkout -B main
       git tag --delete $(git tag)
       git pull --rebase origin main
       ./mvnw --batch-mode --no-transfer-progress release:clean release:prepare release:perform -Ddependency-check.skip=true --file pom.xml
      env:
        CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
        CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
        # maven-gpg-plugin 3.x reads MAVEN_GPG_PASSPHRASE; gpg / older paths may use GPG_PASSPHRASE
        MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASS_PHRASE }}
        GPG_PASSPHRASE: ${{ secrets.GPG_PASS_PHRASE }}
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
