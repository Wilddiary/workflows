# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Release

on:
  push:
    branches: [ "main" ]
  workflow_call:
    inputs:
      ARTIFACTORY_SERVER_ID:
        required: true
        type: string
    secrets:
      GPG_PRIVATE_KEY:
        required: true
      GPG_PASS_PHRASE:
        required: true
      DEPLOY_PRIVATE_KEY:
        required: true
      ARTIFACTORY_USERNAME:
        required: true
      ARTIFACTORY_PASSWORD:
        required: true
      NVD_API_KEY:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: ${{ inputs.ARTIFACTORY_SERVER_ID }}
        server-username: ARTIFACTORY_USERNAME
        server-password: ARTIFACTORY_PASSWORD
        cache: maven

    - name: Import GPG key
      run: |
        echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        gpg --list-secret-keys --keyid-format LONG

    - name: Setup SSH deploy key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DEPLOY_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        printf 'Host github.com\n  HostName github.com\n  User git\n  IdentityFile ~/.ssh/deploy_key\n  IdentitiesOnly yes\n  StrictHostKeyChecking no\n' >> ~/.ssh/config
        ssh -T git@github.com 2>&1 || true

    - name: Build with Maven
      run: |
       git config --global user.email "git@github.com"
       git config --global user.name "GitHub CI"
       git checkout -B main
       git tag --delete $(git tag)
       git fetch --all
       ./mvnw --batch-mode --no-transfer-progress clean release:prepare release:perform -Ddependency-check.skip=true --file pom.xml
      env:
        ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
        ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
        # maven-gpg-plugin 3.x reads MAVEN_GPG_PASSPHRASE; gpg / older paths may use GPG_PASSPHRASE
        MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASS_PHRASE }}
        GPG_PASSPHRASE: ${{ secrets.GPG_PASS_PHRASE }}
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
